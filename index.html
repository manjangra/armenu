<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AR Menu</title>
  
  <!-- Yeh script 3D model ko load karti hai -->
  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>
  
  <style>
    /* Yeh screen ko white/blank hone se rokta hai */
    body {
      margin: 0;
      padding: 0;
      background-color: #ffffff;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }
    
    /* Model Viewer ko poori screen par set karna */
    model-viewer {
      width: 100%;
      height: 100%;
      background-color: #f0f0f0; /* Halka grey color taaki pata chale viewer load hua hai */
    }
  </style>
</head>
<body>

  <!-- Yahan file ka naam exact match hona chahiye -->
  <model-viewer 
    src="burger.glb" 
    ar 
    ar-modes="webxr scene-viewer quick-look" 
    camera-controls 
    auto-rotate 
    shadow-intensity="1">
  </model-viewer>

</body>
</html>
